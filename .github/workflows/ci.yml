# ═══════════════════════════════════════════════════════════════════════════════
#                        BACKEND CI PIPELINE
# ═══════════════════════════════════════════════════════════════════════════════
# Tự động chạy khi push hoặc PR vào main/develop
# Steps: Install → TypeScript check → Build → Docker build test

name: Backend CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    name: 🔨 Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🔍 TypeScript type check
        run: npx tsc --noEmit

      - name: 🔨 Build
        run: npm run build

      - name: ✅ Build success
        run: echo "Backend build passed! ✅"

  docker:
    name: 🐳 Docker Build Test
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Build Docker image
        run: docker build -t lms-backend:test -f dockerfile .

      - name: ✅ Docker build success
        run: echo "Docker image built successfully! ✅"
