version: "3.8"

# ═══════════════════════════════════════════════════════════════════════════════
#                        LMS DOCKER COMPOSE
# ═══════════════════════════════════════════════════════════════════════════════
# Sử dụng:
#   docker compose up -d                  → chạy tất cả
#   docker compose up -d backend admin    → chạy backend + admin
#   docker compose logs -f backend        → xem log backend
#
# Ports:
#   3000  → Backend API
#   3306  → MySQL
#   5173  → LMS Admin
#   5174  → LMS Instructor
#   5175  → LMS Mobile (web)
# ═══════════════════════════════════════════════════════════════════════════════

services:
  # ─── MySQL ─────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: lms-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-lms_db}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend API ───────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: dockerfile
    container_name: lms-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-lms_db}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      GROQ_API_KEY: ${GROQ_API_KEY}
      ALLOWED_ORIGINS: http://localhost:5173,http://localhost:5174,http://localhost:5175
    ports:
      - "3000:3000"
    volumes:
      - backend_assets:/app/assets
      - backend_logs:/app/logs

  # ─── LMS Admin ─────────────────────────────────────────────────────────────
  admin:
    build:
      context: ./LMS-admin
      args:
        VITE_API_URL: http://localhost:3000/api/v1
    container_name: lms-admin
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

  # ─── LMS Instructor ───────────────────────────────────────────────────────
  instructor:
    build:
      context: ./LMS-instructor
      args:
        VITE_API_URL: http://localhost:3000/api/v1
    container_name: lms-instructor
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5174:80"

  # ─── LMS Mobile (web version) ─────────────────────────────────────────────
  mobile:
    build:
      context: ./LMS-mobile
      args:
        EXPO_PUBLIC_API_URL: http://localhost:3000/api/v1
    container_name: lms-mobile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5175:80"

volumes:
  mysql_data:
  backend_assets:
  backend_logs:
